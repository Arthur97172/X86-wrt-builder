name: 📦 Build OpenWrt-25.12.x-x86-64

on:
  workflow_dispatch:
    inputs:
      luci_version:
        description: "选择luci版本"
        required: false
        default: "25.12.0"
        type: choice
        options:
          - '25.12.0'
      ipaddr:
        description: "请设置软路由的管理地址(注意仅对多网口有效) 格式:192.168.x.1 或 10.x.x.1"
        required: true
        default: "192.168.5.1"
      rootfs_partsize:
        description: "设置固件大小 单位(MB)"
        required: true
        default: "2048"
      include_docker:
        description: "是否集成 Docker 插件"
        required: true
        default: "no"
        type: choice
        options:
          - 'yes'
          - 'no'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set executable permissions
        run: |
          chmod +x "${{ github.workspace }}/x86/build25.sh"
          chmod +x "${{ github.workspace }}/shell/prepare-packages.sh"
          chmod +x "${{ github.workspace }}/shell/apk-custom-packages.sh"

      - name: ⚙️ Set custom IP config
        run: |
          sed -i "s/版本号/${{ inputs.luci_version }}/g" files/uci-defaults/99-custom.sh
          sed -i "s/__IPADDR__/${{ inputs.ipaddr }}/g" files/uci-defaults/99-custom.sh
          sed -i "s/VERXXXX/${{ inputs.luci_version }}/g" files/uci-defaults/99-custom.sh
          echo "✅ 配置修改完成"

      - name: 🔨 Building OpenWrt 25.12.x x86-64
        run: |
          docker run --rm -i \
            --user root \
            -v "${{ github.workspace }}/bin:/home/build/openwrt/bin" \
            -v "${{ github.workspace }}/x86:/home/build/openwrt/x86" \
            -v "${{ github.workspace }}/shell:/home/build/openwrt/shell" \
            -v "${{ github.workspace }}/files:/home/build/openwrt/files" \
            -e INCLUDE_DOCKER=${{ inputs.include_docker }} \
            -e ROOTFS_PARTSIZE=${{ inputs.rootfs_partsize }} \
            openwrt/imagebuilder:x86-64-openwrt-${{ inputs.luci_version }} \
            /bin/bash /home/build/openwrt/x86/build25.sh

      - name: 📜 Generate release info
        run: |
          cat > ${{ github.workspace }}/router-info.md <<EOF
          ## 📡 路由器后台信息

          🏠 后台地址： ${{ inputs.ipaddr }}
          👤 用户名： root
          🔑 密码： 无
          🐳 Docker状态： ${{ inputs.include_docker == 'yes' && '已集成' || '未集成' }}
          EOF

      - name: 🚀 Upload to Release
        uses: softprops/action-gh-release@v2.2.1
        with:
          tag_name: OpenWrt-${{ inputs.luci_version }}-x86-64-RELEASE
          body_path: ${{ github.workspace }}/router-info.md
          overwrite: true
          files: |
            bin/targets/x86/64/*squashfs-combined-efi.img.gz
          token: ${{ secrets.GITHUB_TOKEN }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}