name: 📦 Build OpenWrt-25.12.x-x86-64

on:
  workflow_dispatch:
    inputs:
      luci_version:
        description: "选择luci版本"
        required: false
        default: "25.12.4"
        type: choice
        options:
          - '25.12.0'
          - '25.12.1'
          - '25.12.2'
          - '25.12.3'   
          - '25.12.4'          
      ipaddr:
        description: "请设置管理IP"
        required: true
        default: "192.168.10.1"
      rootfs_partsize:
        description: "设置固件大小 单位(MB)"
        required: true
        default: "2048"
      include_docker:
        description: "是否集成 Docker 插件"
        required: true
        default: "no"
        type: choice
        options:
          - 'yes'
          - 'no'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ 设置可执行权限
        run: |
          chmod +x x86/build25.sh
          chmod +x shell/prepare-packages.sh
          chmod +x shell/apk-custom-packages.sh

      - name: ⚙️ 设置IP、版本号
        run: |
          sed -i "s/版本号/${{ inputs.luci_version }}/g" files/uci-defaults/99-custom.sh
          sed -i "s/__IPADDR__/${{ inputs.ipaddr }}/g" files/uci-defaults/99-custom.sh
          sed -i "s/VERXXXX/${{ inputs.luci_version }}/g" files/uci-defaults/99-custom.sh
          echo "✅ 配置修改完成"

      - name: ⏬ 下载 OpenWrt ImageBuilder 25.12.x
        run: |
          BUILD_VER="${{ inputs.luci_version }}"
          URL="https://downloads.openwrt.org/releases/${BUILD_VER}/targets/x86/64/openwrt-imagebuilder-${BUILD_VER}-x86-64.Linux-x86_64.tar.zst"
          curl -Lf -o imagebuilder.tar.zst "$URL"
          tar --use-compress-program=unzstd -xvf imagebuilder.tar.zst
          mv openwrt-imagebuilder-* imagebuilder

      - name: 🔄 复制必备文件
        run: |
          cp x86/build25.sh imagebuilder/
          cp x86/repositories imagebuilder/
          cp shell/prepare-packages.sh imagebuilder/
          cp shell/apk-custom-packages.sh imagebuilder/
          mkdir -p imagebuilder/files/etc/uci-defaults imagebuilder/files/etc/apk
          cp files/uci-defaults/99-custom.sh imagebuilder/files/etc/uci-defaults/
          # 追加自定义源到 APK repositories（FIRMWARE 内 /etc/apk/repositories 会用这个）
          cat files/customfeeds/25.customfeeds.conf >> imagebuilder/files/etc/apk/repositories
          echo "✅ 文件准备完成"

      - name: ⚙️ 动态获取 Kmod 哈希并更新配置
        run: |
          BUILD_VER="${{ inputs.luci_version }}"
          BASE_URL="https://downloads.openwrt.org/releases/${BUILD_VER}/targets/x86/64/kmods/"
          echo "正在从 $BASE_URL 获取最新的内核哈希..."
          KMOD_DIR=$(curl -sL $BASE_URL | grep -oE "[0-9.-]+-[a-f0-9]{32}" | head -n 1)
          if [ -n "$KMOD_DIR" ]; then
            FULL_KMOD_URL="${BASE_URL}${KMOD_DIR}/packages.adb"
            echo "✅ 成功匹配 kmods 路径: $FULL_KMOD_URL"
            # 替换 repositories 文件中的占位符
            sed -i "s|VERSION_PLACEHOLDER|${BUILD_VER}|g" imagebuilder/repositories
            sed -i "s|KMOD_PLACEHOLDER|${FULL_KMOD_URL}|g" imagebuilder/repositories
          else
            echo "❌ 无法获取 Kmod 哈希"
            exit 1
          fi
          cat imagebuilder/repositories

      - name: 🧱 构建 OpenWrt 25.12.x 固件
        working-directory: ./imagebuilder
        env:
          INCLUDE_DOCKER: ${{ inputs.include_docker }}
          ROOTFS_PARTSIZE: ${{ inputs.rootfs_partsize }}
        run: |
          bash ./build25.sh

      - name: 📜 生成发布说明
        run: |
          cat > ${{ github.workspace }}/router-info.md <<EOF
          ## 📡 路由器后台信息

          🏠 后台地址： ${{ inputs.ipaddr }}
          👤 用户名： root
          🔑 密码： 无
          🐳 Docker状态： ${{ inputs.include_docker == 'yes' && '已集成' || '未集成' }}
          EOF

      - name: 🚀 上传到 Release
        uses: softprops/action-gh-release@v2.2.1
        with:
          tag_name: OpenWrt-${{ inputs.luci_version }}-x86-64-RELEASE-Docker-${{ inputs.include_docker }}
          body_path: ${{ github.workspace }}/router-info.md
          overwrite: true
          files: |
            imagebuilder/bin/targets/x86/64/*squashfs-combined-efi.img.gz
            imagebuilder/bin/targets/x86/64/sha256sums
          token: ${{ secrets.GITHUB_TOKEN }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
