name: 📦 Build x86-64 Wrt-24.10.x

on:
  workflow_dispatch:
    inputs:
      wrt_version:
        description: "选择OpenWrt/Immortalwrt"
        required: true
        default: "immortalwrt"
        type: choice
        options:
          - 'immortalwrt'
          - 'openwrt'
      luci_version:
        description: "选择luci版本"
        required: true
        default: "24.10.7"
        type: choice
        options:
          - '24.10.0'
          - '24.10.1'
          - '24.10.2'
          - '24.10.3'
          - '24.10.4' 
          - '24.10.5'         
          - '24.10.6'
          - '24.10.7'          
      ipaddr:
        description: '请输入管理IP'
        required: true
        default: '192.168.10.1'
      rootfs_partsize:
        description: '设置软件包大小 单位(MB)'
        required: true
        default: '256'
        type: choice
        options:
          - '256'
          - '512'
          - '1024'
          - '2048' 
      include_docker:
        description: "是否编译 Docker 插件"
        required: true
        default: 'no'
        type: choice
        options:
          - 'yes'
          - 'no'

env:
# 判断：如果是 immortalwrt，且版本等于 24.10.7，则强制降级为 24.10.6；否则保持用户选择
  FINAL_LUCI_VER: ${{ (inputs.wrt_version == 'immortalwrt' && inputs.luci_version == '24.10.7') && '24.10.6' || inputs.luci_version }}
  FINAL_WRT: ${{ inputs.wrt_version }}
  ROOTFS_PARTSIZE: ${{ inputs.rootfs_partsize }}
  DOCKER: ${{ inputs.include_docker }}

jobs:
  build:
    runs-on: ubuntu-22.04
    # 关键：添加写入权限，解决 403 报错
    permissions:
      contents: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: ⚙️ 设置可执行权限
      run: | 
        chmod +x x86/build24.sh
        chmod +x x86/openwrt-repositories.conf
        chmod +x x86/immortalwrt-repositories.conf    
        chmod +x shell/*.sh

    - name: 🛠️ 安装依赖
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libncurses5-dev libncursesw5-dev zstd curl unzip tree qemu-utils genisoimage

    - name: ⚙️ 设置IP、网关和版本号
      run: |
        CONFIG_PATH="./files/uci-defaults/99-custom.sh"
        sed -i "s/版本号/${{ env.FINAL_LUCI_VER }}/g" "$CONFIG_PATH"
        [ -f "./files/etc/banner" ] && sed -i "s/版本号/${{ env.FINAL_LUCI_VER }}/g" "./files/etc/banner"
        sed -i "s/__IPADDR__/${{ inputs.ipaddr }}/g" "$CONFIG_PATH"
        sed -i "s/VERXXXX/${{ env.FINAL_LUCI_VER }}/g" "$CONFIG_PATH"

    - name: ⏬ 下载 ImageBuilder
      run: |
        URL="https://downloads.${{ env.FINAL_WRT }}.org/releases/${{ env.FINAL_LUCI_VER }}/targets/x86/64/${{ env.FINAL_WRT }}-imagebuilder-${{ env.FINAL_LUCI_VER }}-x86-64.Linux-x86_64.tar.zst"
        curl -Lf -o imagebuilder.tar.zst "$URL"
        tar --use-compress-program=unzstd -xvf imagebuilder.tar.zst
        mv ${WRTINFORM}-imagebuilder-* imagebuilder

    - name: 🔄 复制必备文件
      run: |
        cp x86/build24.sh imagebuilder/
        cp x86/Makefile imagebuilder/

        if [ "${{ env.FINAL_WRT }}" = "openwrt" ]; then
          cp x86/openwrt-repositories.conf imagebuilder/repositories.conf
          cp shell/openwrt-custom-packages.sh imagebuilder/
        else
          cp x86/immortalwrt-repositories.conf imagebuilder/repositories.conf
          cp shell/immortalwrt-custom-packages.sh imagebuilder/
        fi
        
        cp shell/prepare-packages.sh imagebuilder/
        mkdir -p imagebuilder/files/etc/uci-defaults
        cp files/uci-defaults/99-custom.sh imagebuilder/files/etc/uci-defaults/
        mkdir -p imagebuilder/files/etc/opkg
        cp -f files/customfeeds/24.customfeeds.conf imagebuilder/files/etc/opkg/customfeeds.conf 2>/dev/null || true
        # 验证信息
        ls -l imagebuilder/files/etc/opkg/customfeeds.conf && echo "已拷贝 customfeeds.conf"

    - name: ⚙️ 动态获取 Kmod 哈希并更新配置
      run: |
        BASE_URL="https://downloads.${{ env.FINAL_WRT }}.org/releases/${{ env.FINAL_LUCI_VER }}/targets/targets/x86/64/kmods/"
        
        echo "正在从 $BASE_URL 获取最新的内核哈希..."
        # 抓取包含哈希值的文件夹名称 (例如 6.6.110-1-xxx...)
        KMOD_DIR=$(curl -sL $BASE_URL | grep -oE "[0-9.-]+-[a-f0-9]{32}" | head -n 1)
        
        if [ -n "$KMOD_DIR" ]; then
          FULL_KMOD_URL="${BASE_URL}${KMOD_DIR}"
          echo "✅ 成功匹配 kmods 路径: $FULL_KMOD_URL"
          
          # 1. 替换版本占位符
          sed -i "s|VERSION_PLACEHOLDER|${{ env.FINAL_LUCI_VER }}|g" imagebuilder/repositories.conf
          # 2. 替换 Kmod 完整路径
          sed -i "s|https://.*/kmods/KMOD_PLACEHOLDER|$FULL_KMOD_URL|g" imagebuilder/repositories.conf
        else
          echo "❌ 无法获取 Kmod 哈希，请检查官方源是否存在该版本: $BASE_URL"
          exit 1
        fi
        
        echo "--- 检查更新后的 repositories.conf ---"
        cat imagebuilder/repositories.conf | grep "https"

    - name: 🧱 构建 WRT 固件
      working-directory: ./imagebuilder
      env:
        ROOTFS_PARTSIZE: ${{ env.ROOTFS_PARTSIZE }}
        INCLUDE_DOCKER: ${{ inputs.include_docker }}
      run: |
        bash ./build24.sh "${{ inputs.rootfs_partsize }}"

    - name: 📜 生成发布说明
      run: |
        cat > ${{ github.workspace }}/router-info.md <<EOF
        ## 📡 路由器后台信息
        📌 版本： ${{ env.FINAL_WRT }}-${{ env.FINAL_LUCI_VER }}
        🏠 后台地址： ${{ inputs.ipaddr }}
        👤 用户名： root
        🔑 密码： 无
        📜 Docker状态： ${{ inputs.include_docker == 'yes' && '已集成' || '未集成' }}
        EOF

    - name: 🚀 上传到 Release
      uses: softprops/action-gh-release@v2.2.1
      with:
        tag_name: ${{ env.FINAL_WRT }}-${{ env.FINAL_LUCI_VER }}-x86-64-RELEASE-Docker-${{ env.DOCKER }}
        body_path: ${{ github.workspace }}/router-info.md
        files: |
          imagebuilder/bin/targets/x86/64/*squashfs-combined-efi.img.gz
          imagebuilder/bin/targets/x86/64/sha256sums
        token: ${{ secrets.GITHUB_TOKEN }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
